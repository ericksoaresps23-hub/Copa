<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<meta
    name="apple-mobile-web-app-capable"
    content="yes"
/>

<meta
    name="mobile-web-app-capable"
    content="yes"
/>

<title>Brasil Copa</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

<style>

:root{
    --green:#009c3b;
    --yellow:#ffdf00;
    --blue:#002776;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        180deg,
        #02101d,
        #06325a
    );

    overflow:auto;
}

.container{
    width:100%;
    max-width:420px;

    background:
    rgba(12,31,51,.96);

    border-radius:24px;

    padding:24px;

    text-align:center;

    display:flex;
    flex-direction:column;
    align-items:center;

    border:
    2px solid rgba(255,255,255,.08);

    box-shadow:
    0 12px 35px rgba(0,0,0,.45);
}

.logo{
    width:95px;
    height:95px;

    object-fit:cover;

    border-radius:50%;

    border:3px solid var(--yellow);

    margin-bottom:15px;
}

h1{
    color:var(--yellow);

    font-size:28px;

    font-weight:900;

    letter-spacing:2px;

    text-transform:uppercase;
}

.subtitle{
    margin-top:10px;

    color:#fff;

    font-size:15px;
}

#canvas-wrapper{
    width:320px;
    height:320px;

    aspect-ratio:1/1;

    margin:25px auto;

    border-radius:50%;

    overflow:hidden;

    position:relative;

    background:#000;

    border:6px solid var(--yellow);

    box-shadow:
    0 0 0 6px var(--green),
    0 0 25px rgba(255,223,0,.5);
}

/* câmera */
#cameraVideo{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:cover;

    top:0;
    left:0;

    z-index:1;

    background:#000;
}

/* canvas */
.canvas-container,
canvas{
    width:100%!important;
    height:100%!important;

    position:relative;

    z-index:2;
}

.controls{
    width:100%;

    display:flex;
    flex-direction:column;

    gap:14px;
}

.btn{
    width:100%;

    border:none;

    padding:16px;

    border-radius:14px;

    font-size:15px;
    font-weight:900;

    cursor:pointer;

    transition:.2s;
}

.btn:active{
    transform:scale(.98);
}

.upload-btn{
    background:
    linear-gradient(
        45deg,
        var(--green),
        #00b34a
    );

    color:#fff;

    border:
    2px dashed rgba(255,255,255,.3);

    position:relative;

    overflow:hidden;
}

.switch-btn{
    background:
    linear-gradient(
        45deg,
        #0057ff,
        #2f83ff
    );

    color:#fff;
}

.capture-btn{
    background:
    linear-gradient(
        45deg,
        var(--yellow),
        #f7c600
    );

    color:#002776;
}

.download-btn{
    background:
    linear-gradient(
        45deg,
        #ffffff,
        #dfe8ff
    );

    color:#002776;
}

input[type=file]{
    position:absolute;

    width:100%;
    height:100%;

    top:0;
    left:0;

    opacity:0;

    cursor:pointer;
}

.footer{
    margin-top:18px;

    color:#dbe8ff;

    font-size:13px;
}

@media(max-width:480px){

    #canvas-wrapper{
        width:280px;
        height:280px;
    }

    h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<div class="container">

    <img
        class="logo"
        src="https://i.postimg.cc/fWVZ6KPZ/file-00000000abf071f584ff79d0d93aa9be-(1).png"
    >

    <h1>VAMO BRASIL</h1>

    <div class="subtitle">
        Entre no clima da Copa do Mundo
    </div>

    <!-- moldura -->
    <div id="canvas-wrapper">

        <!-- câmera -->
        <video
            id="cameraVideo"
            autoplay
            playsinline
            muted
        ></video>

        <!-- canvas -->
        <canvas id="canvas"></canvas>

    </div>

    <!-- botões -->
    <div class="controls">

        <!-- tirar foto -->
        <button
            class="btn capture-btn"
            onclick="capturePhoto()"
        >
            TIRAR FOTO
        </button>

        <!-- trocar câmera -->
        <button
            class="btn switch-btn"
            onclick="switchCamera()"
        >
            TROCAR CÂMERA
        </button>

        <!-- upload -->
        <div class="btn upload-btn">

            ESCOLHER FOTO

            <input
                type="file"
                id="upload"
                accept="image/*"
            >

        </div>

        <!-- salvar -->
        <button
            class="btn download-btn"
            onclick="downloadImage()"
        >
            SALVAR FOTO
        </button>

    </div>

    <div class="footer">
        Viva a emoção do futebol com as cores do Brasil
    </div>

</div>

<script>

// =========================
// suporte câmera
// =========================

if(
    !navigator.mediaDevices ||
    !navigator.mediaDevices.getUserMedia
){

    alert(
        'Seu navegador não suporta câmera.'
    );
}

// =========================
// canvas
// =========================

const internalSize = 1080;

const canvas = new fabric.Canvas(
    'canvas',
    {
        width:internalSize,
        height:internalSize,
        backgroundColor:'transparent',
        selection:false
    }
);

let currentStream = null;

let currentFacingMode = 'user';

// =========================
// moldura
// =========================

const frameUrl =
'https://i.postimg.cc/mk5SxVz2/file-00000000b1e071f7b530d703a3740bd8-(1).png';

fabric.Image.fromURL(
    frameUrl,
    function(img){

        img.set({

            scaleX:
            internalSize / img.width,

            scaleY:
            internalSize / img.height,

            originX:'center',
            originY:'center',

            left:
            internalSize / 2,

            top:
            internalSize / 2,

            selectable:false,
            evented:false
        });

        canvas.setOverlayImage(
            img,
            canvas.renderAll.bind(canvas)
        );
    },
    {
        crossOrigin:'anonymous'
    }
);

// =========================
// inicia câmera automática
// =========================

window.addEventListener(
    'load',
    () => {

        startCamera();
    }
);

// =========================
// abrir câmera
// =========================

async function startCamera(){

    const video =
    document.getElementById(
        'cameraVideo'
    );

    try{

        // fecha antiga
        if(currentStream){

            currentStream
            .getTracks()
            .forEach(
                track=>track.stop()
            );
        }

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{

                facingMode:{
                    ideal:
                    currentFacingMode
                },

                width:{
                    ideal:1080
                },

                height:{
                    ideal:1080
                }
            },

            audio:false
        });

        currentStream = stream;

        video.srcObject = stream;

        await video.play();

    }catch(err){

        console.log(err);

        alert(
            'Permita acesso à câmera do aparelho.'
        );
    }
}

// =========================
// trocar câmera
// =========================

async function switchCamera(){

    if(
        currentFacingMode === 'user'
    ){

        currentFacingMode =
        'environment';

    }else{

        currentFacingMode =
        'user';
    }

    await startCamera();
}

// =========================
// tirar foto
// =========================

function capturePhoto(){

    const video =
    document.getElementById(
        'cameraVideo'
    );

    if(!currentStream){

        alert(
            'Câmera não iniciada.'
        );

        return;
    }

    const temp =
    document.createElement(
        'canvas'
    );

    temp.width =
    video.videoWidth;

    temp.height =
    video.videoHeight;

    const ctx =
    temp.getContext('2d');

    // sem espelhamento
    ctx.drawImage(
        video,
        0,
        0
    );

    const image =
    temp.toDataURL(
        'image/png'
    );

    addImage(image);
}

// =========================
// upload imagem
// =========================

document
.getElementById('upload')
.onchange = function(e){

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload = function(f){

        addImage(
            f.target.result
        );
    };

    reader.readAsDataURL(file);
};

// =========================
// adicionar imagem
// =========================

function addImage(src){

    fabric.Image.fromURL(
        src,
        function(img){

            // remove antigas
            const objects =
            canvas.getObjects();

            objects.forEach(
                obj=>canvas.remove(obj)
            );

            // zoom extra para cortar bordas
            const extraZoom = 1.08;

            const scale =
            Math.max(
                (internalSize * extraZoom) / img.width,
                (internalSize * extraZoom) / img.height
            );

            img.set({

                scaleX:scale,
                scaleY:scale,

                originX:'center',
                originY:'center',

                left:
                internalSize / 2,

                top:
                internalSize / 2,

                hasControls:false,
                hasBorders:false
            });

            canvas.add(img);

            canvas.sendToBack(img);

            canvas.renderAll();

            initTouch(img);
        }
    );
}

// =========================
// touch zoom
// =========================

function initTouch(obj){

    const wrapper =
    document.getElementById(
        'canvas-wrapper'
    );

    const mc =
    new Hammer.Manager(wrapper);

    mc.add(
        new Hammer.Pan({
            threshold:0,
            pointers:0
        })
    );

    mc.add(
        new Hammer.Pinch({
            threshold:0
        })
    ).recognizeWith(
        mc.get('pan')
    );

    let startX,
        startY,
        startScale;

    mc.on(
        'panstart pinchstart',
        function(){

            startX =
            obj.left;

            startY =
            obj.top;

            startScale =
            obj.scaleX;
        }
    );

    mc.on(
        'panmove pinchmove',
        function(e){

            const ratio =
            internalSize /
            wrapper.clientWidth;

            obj.set({

                left:
                startX +
                (e.deltaX * ratio),

                top:
                startY +
                (e.deltaY * ratio),

                scaleX:
                startScale *
                e.scale,

                scaleY:
                startScale *
                e.scale
            });

            canvas.renderAll();
        }
    );
}

// =========================
// download PNG redondo
// =========================

function downloadImage(){

    canvas.discardActiveObject();

    canvas.renderAll();

    const exportSize = 1080;

    // canvas final
    const finalCanvas =
    document.createElement('canvas');

    finalCanvas.width =
    exportSize;

    finalCanvas.height =
    exportSize;

    const ctx =
    finalCanvas.getContext('2d');

    // transparente
    ctx.clearRect(
        0,
        0,
        exportSize,
        exportSize
    );

    // recorte redondo
    ctx.save();

    ctx.beginPath();

    ctx.arc(
        exportSize / 2,
        exportSize / 2,
        exportSize / 2,
        0,
        Math.PI * 2
    );

    ctx.closePath();

    ctx.clip();

    // imagem final
    const finalImage =
    new Image();

    finalImage.onload = function(){

        ctx.drawImage(
            finalImage,
            0,
            0,
            exportSize,
            exportSize
        );

        ctx.restore();

        // PNG transparente
        const png =
        finalCanvas.toDataURL(
            'image/png'
        );

        const link =
        document.createElement('a');

        link.download =
        'brasil-copa.png';

        link.href = png;

        link.click();
    };

    finalImage.src =
    canvas.toDataURL({

        format:'png',

        quality:1,

        multiplier:1,

        withoutTransform:false
    });
}

</script>

</body>
</html>
